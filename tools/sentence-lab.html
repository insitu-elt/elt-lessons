<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sentence Lab · BELLA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0E1F3D; --navy-mid:  #1A3461; --gold:      #C8960A;
      --gold-lt:   #F5C842; --gold-pale: #FDF6E3; --cream:     #F8F5EE;
      --cream-dk:  #EDE8DC; --ink:       #1A1A2E; --mid-grey:  #666677;
      --lt-grey:   #D0CFC8;
      --c-noun: #0D7C7C; --c-verb: #B8860B; --c-adjective: #C0392B;
      --c-adverb: #7D3C98; --c-preposition: #2471A3; --c-determiner: #7D6608;
      --c-pronoun: #CA6F1E; --c-conjunction: #1E8449; --c-punctuation: #999999;
      --cl-main: #0E1F3D; --cl-relative: #1E8449; --cl-adverbial: #B7950B; --cl-noun: #943126;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--cream); color: var(--ink); padding-top: 44px; min-height: 100vh; }
    .site-nav { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: var(--navy); border-bottom: 2px solid var(--gold); box-shadow: 0 2px 8px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 1000; }
    .nav-home { display: flex; align-items: center; gap: 7px; color: var(--gold); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
    .nav-title { font-family: 'Playfair Display', serif; font-style: italic; color: rgba(248,245,238,0.70); flex: 1; text-align: right; padding-left: 12px; }
    .page-header { background: var(--navy); border-bottom: 3px solid var(--gold); padding: 28px 24px 24px; text-align: center; }
    .page-badge { display: inline-block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(200,150,10,0.45); padding: 2px 10px; margin-bottom: 12px; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2.4rem); color: var(--gold-lt); margin-bottom: 6px; }
    .main-container { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; }
    textarea#sentence-input { width: 100%; min-height: 100px; background: var(--gold-pale); border: 2px solid var(--navy-mid); border-radius: 4px; padding: 12px; font-size: 1rem; resize: vertical; outline: none; }
    .toolbar { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .btn-analyse { background: var(--navy); color: var(--gold-lt); border: 1.5px solid var(--gold); border-radius: 4px; padding: 8px 22px; font-weight: 600; cursor: pointer; }
    .btn-analyse:disabled { opacity: 0.5; cursor: not-allowed; }
    .display-area { display: none; margin-top: 22px; }
    .display-area.visible { display: block; }
    .display-area.loading { opacity: 0.5; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 0.25; } }
    .word-row { display: flex; flex-wrap: wrap; align-items: flex-end; line-height: 2; }
    .word-span { font-size: 1.15rem; padding: 2px 1px 4px; border-bottom: 2px solid transparent; position: relative; white-space: pre; }
    .word-span.has-space::after { content: '\00a0'; }
    /* Word Class Coloring */
    .word-span[data-class="noun"] { border-bottom-color: var(--c-noun); }
    .word-span[data-class="verb"] { border-bottom-color: var(--c-verb); }
    .word-span[data-class="adjective"] { border-bottom-color: var(--c-adjective); }
    /* ... other styles kept from your original ... */
    .clause-area { display: none; position: relative; margin-top: 6px; }
    .analyse-mode .clause-area { display: block; }
    .site-footer { background: var(--navy); border-top: 3px solid var(--gold); text-align: center; padding: 18px; font-size: 0.75rem; color: rgba(248,245,238,0.40); margin-top: 60px; }
  </style>
</head>
<body>
  <nav class="site-nav"><a class="nav-home" href="../index.html">Lesson Library</a><span class="nav-title">The Sentence Lab</span></nav>
  <header class="page-header"><div class="page-badge">BELLA</div><h1>The Sentence Lab</h1></header>
  <main class="main-container">
    <textarea id="sentence-input" placeholder="Enter a sentence..."></textarea>
    <div class="toolbar"><button class="btn-analyse" id="btn-analyse" disabled>Analyse</button></div>
    <div class="display-area" id="display-area">
      <div id="sentence-render-container"></div>
    </div>
  </main>
  <footer class="site-footer">BELLA &middot; 2026</footer>

<script>
  let analysisData = null;
  let currentSentence = 0;
  const textarea = document.getElementById('sentence-input');
  const analyseButton = document.getElementById('btn-analyse');
  const displayArea = document.getElementById('display-area');
  const renderContainer = document.getElementById('sentence-render-container');

  textarea.addEventListener('input', () => { analyseButton.disabled = textarea.value.trim().length === 0; });

  analyseButton.addEventListener('click', async () => {
    const text = textarea.value.trim();
    if (!text) return;
    displayArea.classList.add('visible', 'loading');
    analyseButton.disabled = true;
    analyseButton.textContent = 'Analysing...';

    try {
      const response = await fetch('/.netlify/functions/analyse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sentence: text })
      });
      if (!response.ok) throw new Error('Function Error');
      const data = await response.json();
      analysisData = JSON.parse(data.content[0].text);
      currentSentence = 0;
      displayArea.classList.remove('loading');
      renderCurrentSentence();
    } catch (e) {
      alert("Oops! Check Netlify Logs: " + e.message);
      displayArea.classList.remove('visible', 'loading');
    } finally {
      analyseButton.disabled = false;
      analyseButton.textContent = 'Analyse';
    }
  });

  function renderCurrentSentence() {
    if (!analysisData) return;
    const sentence = analysisData.sentences[currentSentence];
    renderContainer.innerHTML = '';
    const wordRow = document.createElement('div');
    wordRow.className = 'word-row';
    sentence.tokens.forEach(t => {
      const s = document.createElement('span');
      s.className = 'word-span';
      if (t.whitespace) s.classList.add('has-space');
      s.dataset.class = t.class;
      s.textContent = t.word;
      wordRow.appendChild(s);
    });
    renderContainer.appendChild(wordRow);
  }
</script>
</body>
</html>
