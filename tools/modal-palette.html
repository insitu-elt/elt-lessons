<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Modal Palette · BELLA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy:      #0E1F3D;
  --navy-mid:  #1A3461;
  --gold:      #C8960A;
  --gold-lt:   #F5C842;
  --gold-pale: #FDF6E3;
  --cream:     #F8F5EE;
  --cream-dk:  #EDE8DC;
  --ink:       #1A1A2E;
  --mid-grey:  #666677;
  --lt-grey:   #D0CFC8;
  --error-mud: #78716c;
  --error-bg:  rgba(120,113,108,0.10);
  --warn-amber:#b45309;
  --warn-bg:   rgba(180,83,9,0.09);
  --active-color: var(--gold);
  --active-wash:  rgba(200,150,10,0.08);
  --ease:       cubic-bezier(0.16, 1, 0.3, 1);
  --transition: 0.5s var(--ease);
  --radius:     5px;
  --shadow:     0 4px 18px rgba(14,31,61,0.10), 0 1px 3px rgba(14,31,61,0.06);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* APP SHELL: Lock the viewport height */
html, body {
  height: 100vh;
  overflow: hidden; /* Stops the whole page from scrolling */
}

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--cream);
  color: var(--ink);
  display: flex;
  flex-direction: column; /* Stacks header over main content */
}

/* STATIC HEADER: Does not move */
.app-header {
  flex: 0 0 auto;
  z-index: 1000;
  background: var(--navy);
  box-shadow: var(--shadow);
}

/* SCROLLABLE MAIN: Only this area scrolls */
.app-main {
  flex: 1 1 auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* NAV */
.site-nav{
  height: 44px;
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
}
.nav-home{display:flex;align-items:center;gap:7px;color:var(--gold);text-decoration:none;font-size:0.82rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;transition:color 0.15s;}
.nav-home:hover{color:var(--gold-lt);}
.nav-title{font-family:'Playfair Display',serif;font-style:italic;font-size:0.95rem;color:rgba(248,245,238,0.65);}
@media(max-width:499px){.nav-title{display:none;}}

/* PAGE HEADER */
.page-header{
  padding: 20px 24px 16px;
  text-align: center;
  border-bottom: 3px solid var(--gold);
}
.page-badge{display:inline-block;font-size:0.68rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(200,150,10,0.4);border-radius:3px;padding:2px 10px;margin-bottom:12px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,4vw,2.5rem);color:var(--gold-lt);font-weight:700;margin-bottom:6px;}
.page-header .subtitle{font-style:italic;color:rgba(248,245,238,0.65);font-size:1rem;}

/* FILTER BAR */
.filter-bar{
  background:var(--cream-dk);
  border-bottom:1px solid var(--lt-grey);
  padding:0 20px;
  overflow-x:auto;
  scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-tabs{display:flex;gap:0;width:100%;justify-content:center;flex-wrap:wrap;}
.filter-tab{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--mid-grey);padding:0.7rem 1.1rem;font-family:'Source Sans 3',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:0.03em;cursor:pointer;white-space:nowrap;transition:color 0.2s,border-color 0.2s;}
.filter-tab:hover{color:var(--ink);}
.filter-tab.active{color:var(--navy);border-bottom-color:var(--gold);}
.filter-loading{padding:0.7rem 0;font-size:0.82rem;color:var(--mid-grey);font-style:italic;display:flex;align-items:center;gap:0.6rem;}
.spinner{width:14px;height:14px;border:2px solid var(--lt-grey);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CONTENT GRID */
.main-container{max-width:1200px;margin:0 auto;padding:32px 20px 72px;display:grid;grid-template-columns:1.25fr 1fr;gap:40px;align-items:start;}
@media(max-width:900px){.main-container{grid-template-columns:1fr;gap:28px;}}

/* CARD & SENTENCE */
.scenario-card{
  background:var(--cream);
  border:1px solid var(--lt-grey);
  border-top:3px solid var(--lt-grey);
  border-radius:var(--radius);
  padding:28px;
  box-shadow:var(--shadow);
  filter:saturate(0.15);
  transition: border-top-color 0.55s var(--ease), box-shadow 0.55s var(--ease), filter 0.55s var(--ease), opacity 0.35s ease, transform 0.5s var(--ease);
}
.scenario-card.has-colour{filter:saturate(1); border-top-color:var(--active-color); box-shadow:0 6px 28px var(--active-wash),0 1px 4px rgba(14,31,61,0.06);}
.context-block{display:flex;align-items:flex-start;gap:10px; background:var(--gold-pale); border-left:3px solid var(--lt-grey); border-radius:3px; padding:10px 14px; margin-bottom:24px; font-size:0.92rem; font-style:italic;}
.sentence-display{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,3vw,2.1rem);font-weight:400;line-height:1.5;color:var(--ink);}

/* SLOT */
.slot{display:inline-block;position:relative;min-width:115px;padding:0 0.25em;margin:0 0.1em;font-weight:700;font-style:italic;text-align:center;transition:color 0.45s var(--ease);}
.slot.empty{color:transparent;}
.slot.empty::after{content:'';position:absolute;bottom:0.18em;left:0;right:0;height:2px;background:repeating-linear-gradient(90deg,var(--lt-grey) 0,var(--lt-grey) 6px,transparent 6px,transparent 12px);}
.slot.filled{color:var(--active-color);}
.slot.filled::after{content:'';position:absolute;bottom:0.08em;left:-3px;right:-3px;height:10px;border-radius:2px;background:var(--active-wash);z-index:-1;}
.slot.grammar-error{color:var(--error-mud)!important;}
.slot.grammar-error::after{background:var(--error-bg)!important;}
.slot.context-error{color:var(--warn-amber)!important;}
.slot.context-error::after{background:var(--warn-bg)!important;}
.slot.pulse{animation:slotPulse 0.6s var(--ease);}
@keyframes slotPulse{0%{transform:scale(0.9);opacity:0.5;}55%{transform:scale(1.07);}100%{transform:scale(1);opacity:1;}}
@keyframes slotShake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}

/* MODAL ROWS */
.modal-list{display:flex;flex-direction:column;gap:6px;}
.modal-row{
  background:var(--cream); border:1px solid var(--lt-grey); border-left:4px solid transparent; border-radius:var(--radius);
  padding:12px 14px; cursor:pointer; opacity:0; transform:translateX(14px); position:relative; overflow:hidden;
  transition:border-color 0.3s var(--ease), box-shadow 0.3s var(--ease), transform 0.3s var(--ease);
}
.modal-row.revealed{animation:rowReveal 0.55s var(--ease) forwards;}
@keyframes rowReveal{100%{opacity:1;transform:translateX(0);}}
.modal-row:hover{border-left-color:var(--gold); transform:translateX(-2px);}
.modal-row.active{border-left-color:var(--swatch-base,var(--gold)); background:var(--gold-pale);}
.modal-row-inner{display:flex;align-items:center;gap:12px;}
.swatch-dot{width:18px;height:18px;border-radius:50%;background:var(--swatch-base,var(--lt-grey));border:2px solid rgba(255,255,255,0.7);outline:1px solid rgba(0,0,0,0.08);}
.modal-word{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--ink);display:block;}
.modal-row.active .modal-word{color:var(--swatch-base,var(--gold));font-style:italic;}
.modal-note{max-height:0;overflow:hidden;opacity:0;font-size:0.88rem;color:var(--mid-grey);line-height:1.55;transition:max-height 0.5s var(--ease), opacity 0.4s ease;}
.modal-row.active .modal-note{max-height:200px;opacity:1;margin-top:10px;padding-top:10px;border-top:1px dashed var(--lt-grey);}

/* UTILS */
.stage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.function-tag,.cefr-badge{font-size:0.68rem;font-weight:600;text-transform:uppercase;border-radius:3px;padding:3px 9px;}
.function-tag{color:var(--gold);border:1px solid rgba(200,150,10,0.4);background:rgba(200,150,10,0.07);}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:28px;}
.btn-prev,.btn-next{background:var(--navy);color:var(--gold-lt);border:1.5px solid var(--gold);border-radius:4px;padding:8px 20px;font-weight:600;cursor:pointer;}
.site-footer{background:var(--navy);border-top:3px solid var(--gold);text-align:center;padding:18px 20px;font-size:0.75rem;color:rgba(248,245,238,0.38);}
</style>
</head>
<body>

<div class="app-header">
  <nav class="site-nav">
    <a class="nav-home" href="../index.html"><span>&#8962;</span> <span>Lesson Library</span></a>
    <span class="nav-title">The Modal Palette</span>
  </nav>

  <header class="page-header">
    <div class="page-badge">BELLA &middot; Grammar Module</div>
    <h1>The Modal Palette</h1>
    <p class="subtitle">Explore how modal verbs shade meaning, certainty and register</p>
  </header>

  <div class="filter-bar">
    <div class="filter-tabs" id="filterTabs">
      <div class="filter-loading" id="filterLoading">
        <div class="spinner"></div>
        <span>Loading&hellip;</span>
      </div>
    </div>
  </div>
</div>

<main class="app-main">
  <div class="main-container">
    <section>
      <div class="stage-header">
        <div style="display:flex;gap:6px;">
          <span class="function-tag" id="functionTag"></span>
          <span class="cefr-badge" id="cefrBadge"></span>
        </div>
        <span id="counter" style="font-size:0.82rem;font-weight:600;color:var(--mid-grey);"></span>
      </div>

      <div class="scenario-card" id="scenarioCard">
        <div class="context-block">
          <span style="opacity:0.45;">◎</span>
          <span id="contextText"></span>
        </div>
        <div class="sentence-display" id="sentenceDisplay"></div>
      </div>

      <div class="controls">
        <button class="btn-prev" id="btnPrev">Prev</button>
        <div id="dotRow" style="display:flex;gap:6px;"></div>
        <button class="btn-next" id="btnNext">Next</button>
      </div>
    </section>

    <aside>
      <div style="font-family:'Playfair Display';font-size:1.05rem;font-weight:700;color:var(--navy);border-bottom:2px solid var(--gold);padding-bottom:6px;margin-bottom:10px;">Colour Palette</div>
      <p style="font-size:0.88rem;color:var(--mid-grey);font-style:italic;margin-bottom:18px;">Select a shade to mix it into the sentence.</p>
      <div class="modal-list" id="modalList"></div>
      <div id="legend" style="margin-top:24px;padding-top:16px;border-top:1px solid var(--lt-grey);"></div>
    </aside>
  </div>

  <footer class="site-footer">
    BELLA &mdash; English Language Assistant Suite &mdash; Grammar Module
  </footer>
</main>

<script>
const DATA_URL='./modal-bank.json?v=' + Date.now();
let bank=null,sentences=[],filter='all',idx=0,visited=new Set([0]);

const root=document.documentElement;
const scenarioCard=document.getElementById('scenarioCard');
const contextText=document.getElementById('contextText');
const sentenceEl=document.getElementById('sentenceDisplay');
const modalList=document.getElementById('modalList');
const functionTag=document.getElementById('functionTag');
const cefrBadge=document.getElementById('cefrBadge');
const counter=document.getElementById('counter');
const filterTabsEl=document.getElementById('filterTabs');
const filterLoad=document.getElementById('filterLoading');
const dotRow=document.getElementById('dotRow');
const legend=document.getElementById('legend');

async function init(){
  try{
    const res=await fetch(DATA_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    bank=await res.json();
    buildFilterTabs();
    buildLegend();
    applyFilter('all');
  }catch(err){
    filterLoad.innerHTML='⚠ Error loading bank. Check server.';
    console.warn(err);
  }
}

function buildFilterTabs(){
  if(filterLoad) filterLoad.remove();
  const present=new Set(bank.sentences.map(s=>s.function));
  addTab('All structures','all',true);
  Object.entries(bank.functions).forEach(([key,meta])=>{
    if(present.has(key)) addTab(meta.label,key,false);
  });
}

function addTab(label,value,active){
  const btn=document.createElement('button');
  btn.className='filter-tab'+(active?' active':'');
  btn.textContent=label;
  btn.onclick=()=>{
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(value);
  };
  filterTabsEl.appendChild(btn);
}

function buildLegend(){
  const families={};
  Object.values(bank.palette).forEach(p=>{
    if(p.family!=='error' && !families[p.family]) families[p.family]=p.hex;
  });
  let html='<div style="font-size:0.72rem;font-weight:600;text-transform:uppercase;color:var(--mid-grey);margin-bottom:8px;">Colour key</div><div style="display:flex;flex-wrap:wrap;gap:5px;">';
  Object.entries(families).forEach(([fam,hex])=>{
    html+=`<div style="display:flex;align-items:center;gap:5px;font-size:0.76rem;color:var(--mid-grey);padding:3px 8px;border:1px solid var(--lt-grey);border-radius:20px;background:var(--cream-dk);"><div style="width:8px;height:8px;border-radius:50%;background:${hex}"></div>${fam}</div>`;
  });
  legend.innerHTML=html+'</div>';
}

function applyFilter(value){
  filter=value; idx=0; visited=new Set([0]);
  sentences=value==='all'?bank.sentences:bank.sentences.filter(s=>s.function===value);
  cardTransition(()=>{renderSentence();renderModals();});
}

function renderSentence(chosen=null){
  const item=sentences[idx];
  if(!item) return;
  functionTag.textContent=bank.functions[item.function]?.label??item.function;
  cefrBadge.textContent=item.cefr;
  contextText.textContent=item.context;
  counter.textContent=String(idx+1).padStart(2,'0')+' / '+String(sentences.length).padStart(2,'0');

  const suffix=item.slot_after_modal?' '+item.slot_after_modal:'';
  let slotClass, slotText;
  if(!chosen){slotText='______';slotClass='slot empty';}
  else{slotText=chosen.word+suffix;slotClass='slot filled pulse'+(!chosen.ok?(chosen.context_error?' context-error':' grammar-error'):'');}

  let afterText = item.after || '';
  if (chosen && chosen.question && afterText.endsWith('.')) afterText = afterText.slice(0, -1) + '?';

  sentenceEl.innerHTML=(item.before?item.before+' ':'')+`<span class="${slotClass}" id="activeSlot">${slotText}</span>`+(afterText?' '+afterText:'');

  if(chosen&&chosen.ok){
    const p=bank.palette[chosen.palette_key];
    root.style.setProperty('--active-color',p.hex);
    root.style.setProperty('--active-wash',p.bg);
    scenarioCard.classList.add('has-colour');
  } else {
    scenarioCard.classList.remove('has-colour');
  }
}

function renderModals(){
  const item=sentences[idx];
  modalList.innerHTML='';
  item.modals.forEach((m,i)=>{
    const p=bank.palette[m.palette_key]??bank.palette['ERROR'];
    const row=document.createElement('div');
    row.className='modal-row'+(!m.ok?(m.context_error?' context-error':' grammar-error'):'');
    row.style.setProperty('--swatch-base',p.hex);
    row.innerHTML=`<div class="modal-row-inner"><div class="swatch-dot"></div><div class="modal-text"><span class="modal-word">${m.word}</span><span style="font-size:0.84rem;color:var(--mid-grey);">${m.gloss}</span></div></div><div class="modal-note">${m.note}</div>`;
    row.onclick=()=>{
      document.querySelectorAll('.modal-row').forEach(r=>r.classList.remove('active'));
      row.classList.add('active');
      renderSentence(m);
    };
    setTimeout(()=>row.classList.add('revealed'),i*70);
    modalList.appendChild(row);
  });
}

function cardTransition(cb){
  scenarioCard.style.opacity='0';
  scenarioCard.style.transform='translateY(16px)';
  setTimeout(()=>{cb();scenarioCard.style.opacity='1';scenarioCard.style.transform='translateY(0)';},280);
}

function advance(dir){
  idx=(idx+dir+sentences.length)%sentences.length;
  cardTransition(()=>{renderSentence();renderModals();});
}

document.getElementById('btnNext').onclick=()=>advance(1);
document.getElementById('btnPrev').onclick=()=>advance(-1);

init();
</script>
</body>
</html>
